networks:
  db_net:
    internal: true
  app_net:
  tor_net:
    internal: true

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - db_net
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tor-proxy:
    image: dperson/torproxy:latest
    restart: unless-stopped
    networks:
      - tor_net
    environment:
      - TOR_MaxCircuitDirtiness=600
    healthcheck:
      test: ["CMD-SHELL", "curl -s --socks5 127.0.0.1:9050 https://check.torproject.org/api/ip | grep -q IsTor || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  collector:
    build: ./collector
    depends_on:
      db:
        condition: service_healthy
      tor-proxy:
        condition: service_started
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_PRIMARY_MODEL=${OLLAMA_PRIMARY_MODEL:-gemma4:31b-cloud}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - LMSTUDIO_URL=${LMSTUDIO_URL:-}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-local-model}
      - OTX_API_KEY=${OTX_API_KEY:-}
      - ABUSECH_API_KEY=${ABUSECH_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - DARK_WEB_ENABLED=${DARK_WEB_ENABLED:-false}
      - DARK_WEB_KEYWORDS=${DARK_WEB_KEYWORDS:-}
      - DARK_WEB_ONION_SOURCES=${DARK_WEB_ONION_SOURCES:-}
      - DARK_WEB_INTERVAL=${DARK_WEB_INTERVAL:-21600}
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_net
      - db_net
      - tor_net
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_PRIMARY_MODEL=${OLLAMA_PRIMARY_MODEL:-gemma4:31b-cloud}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_net
      - db_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${WEBUI_PORT:-8501}:80"
    depends_on:
      - api
    networks:
      - app_net
    restart: unless-stopped

volumes:
  pgdata:
